<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFK Games Studio | Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="container nav-wrap">
      <span class="brand-spacer"></span>
      <button class="menu-btn" aria-label="Menü">☰</button>
      <div class="nav-links">
        <a href="index.html">Ana Sayfa</a>
        <a href="index.html#games">Oyunlarımız</a>
        <a href="index.html#news">Haberler</a>
        <a href="index.html#about">Hakkımızda</a>
        <a href="index.html#contact">İletişim</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Tema değiştir">🌙</button>
      </div>
    </nav>
  </header>

  <main class="container page-section">
    <section id="admin-lock" class="card admin-lock-card">
      <p class="eyebrow">Erişim korumalı</p>
      <h1>Admin paneline giriş</h1>
      <p>Devam etmek için şifreyi girin.</p>
      <div class="admin-password-box">
        <input id="admin-password" type="password" placeholder="Şifre" />
        <button id="unlock-admin" class="btn btn-primary" type="button">Giriş Yap</button>
      </div>
      <p id="admin-error" class="hint" hidden>Şifre yanlış. Lütfen tekrar deneyin.</p>
    </section>

    <section id="admin-content" hidden class="grid admin-grid">
      <article class="card">
        <h2>Oyun Yönetimi</h2>
        <form id="game-form" class="admin-form">
          <input type="text" id="game-title" placeholder="Oyun adı" required />
          <input type="text" id="game-tag" placeholder="Tür / Etiket" required />
          <input type="text" id="game-platform" placeholder="Platform (Steam, Web, Mobil)" />
          <input type="text" id="game-image" placeholder="Kapak / görsel URL" />
          <input type="text" id="game-link" placeholder="Bağlantı URL" />
          <select id="game-status">
            <option value="published">Yayınlandı</option>
            <option value="draft">Taslak</option>
          </select>
          <textarea id="game-desc" placeholder="Kısa açıklama" required></textarea>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <button type="button" id="cancel-game-edit" class="btn btn-secondary" hidden>İptal</button>
          </div>
        </form>
        <input id="game-filter" class="filter-input" type="search" placeholder="Oyunlarda ara..." />
        <div id="game-list" class="mini-list"></div>
      </article>

      <article class="card">
        <h2>Haber Yönetimi</h2>
        <form id="news-form" class="admin-form">
          <input type="text" id="news-title" placeholder="Haber başlığı" required />
          <input type="text" id="news-category" placeholder="Kategori (örn. Güncelleme)" required />
          <input type="text" id="news-date" placeholder="Tarih (örn. 15 Haziran 2026)" required />
          <input type="text" id="news-image" placeholder="Görsel URL" />
          <input type="text" id="news-link" placeholder="Bağlantı URL" />
          <select id="news-status">
            <option value="published">Yayınlandı</option>
            <option value="draft">Taslak</option>
          </select>
          <textarea id="news-desc" placeholder="Haber içeriği" required></textarea>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Kaydet</button>
            <button type="button" id="cancel-news-edit" class="btn btn-secondary" hidden>İptal</button>
          </div>
        </form>
        <input id="news-filter" class="filter-input" type="search" placeholder="Haberlarda ara..." />
        <div id="news-admin-list" class="mini-list"></div>
      </article>

      <article class="card full-width-card">
        <h2>Site İçeriği</h2>
        <form id="site-form" class="admin-form two-cols">
          <input type="text" id="site-title" placeholder="Ana başlık" />
          <input type="text" id="site-subtitle" placeholder="Alt metin" />
          <input type="text" id="site-email" placeholder="E-posta" />
          <input type="text" id="site-phone" placeholder="Telefon" />
          <textarea id="site-about" placeholder="Hakkımızda metni"></textarea>
          <button type="submit" class="btn btn-primary">Ayarları Kaydet</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> AFK Games Studio. Tüm hakları saklıdır.</p>
      <a href="admin.html">Admin Panel</a>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
